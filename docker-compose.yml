services:
  # PROJECT 1 - PORTFOLIO
  portfolio:
    build:
      context: projects/hvkalayil.github.io
      dockerfile: Dockerfile
    ports:
      - "1000:80"
    restart: unless-stopped

  # PROJECT 2 - Learn.io
  learnio-frontend:
    build:
      context: projects/learn.io/apps/web
      dockerfile: Dockerfile
    ports:
      - "1001:8000"
    env_file:
      - projects/learn.io/.frontend.env
    restart: unless-stopped

  learnio-backend:
    build:
      context: projects/learn.io/apps/api
      dockerfile: Dockerfile
    ports:
      - "1002:4000"
    env_file:
      - projects/learn.io/.api.env
    restart: unless-stopped

  learnio-db:
    image: ghcr.io/muchobien/pocketbase:latest
    container_name: learnio-db
    ports:
      - "1003:8090"
    volumes:
      - ./data/learnio:/pb_data
    restart: unless-stopped

  # PROJECT 3 - Sens.ai
  sens.ai-frontend:
    build:
      context: projects/sens.ai
      dockerfile: apps/fe/Dockerfile
    ports:
      - "1004:80"
    env_file:
      - projects/sens.ai/apps/fe/.env
    restart: unless-stopped

  sens.ai-backend:
    build:
      context: projects/sens.ai
      dockerfile: apps/be/Dockerfile
    ports:
      - "1005:4000"
    env_file:
      - projects/sens.ai/apps/be/.env
    restart: unless-stopped

  sens.ai-db:
    image: ghcr.io/muchobien/pocketbase:latest
    container_name: sensai-db
    ports:
      - "1006:8090"
    volumes:
      - ./data/sensai:/pb_data
    restart: unless-stopped
